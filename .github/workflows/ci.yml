name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  s0-toolchain:
    name: S0 - Toolchain, fmt and dependency boundary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Install Rust 1.94.1 from rust-toolchain.toml
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: 1.94.1
          components: rustfmt,clippy

      - name: S0 - Print toolchain and lockfile hash
        run: |
          set -euo pipefail
          rustc --version --verbose
          cargo --version
          echo "lockfile_sha256=$(sha256sum Cargo.lock | cut -d' ' -f1)" >> "$GITHUB_ENV"
          echo "lockfile hash: $(sha256sum Cargo.lock | cut -d' ' -f1)"

      - name: S0 - Format check
        run: cargo fmt --check

      - name: S0 - Dependency boundary check
        run: |
          set -euo pipefail
          cargo check -p cheetah-media-api
          cargo check -p cheetah-sdk
          cargo clippy -p cheetah-media-api -- -D warnings
          cargo clippy -p cheetah-sdk -- -D warnings

      - name: S0 - L0 domain unit tests
        run: |
          set -euo pipefail
          cargo test -p cheetah-media-api
          cargo test -p cheetah-sdk

  s1-core:
    name: S1 - Core, SDK and serde compatibility
    needs: s0-toolchain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust 1.94.1
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: 1.94.1

      - name: S1 - Core/Sdk unit and integration tests
        run: |
          set -euo pipefail
          cargo test -p cheetah-codec
          cargo test -p cheetah-runtime-api
          cargo test -p cheetah-media-api
          cargo test -p cheetah-sdk

  s2-modules:
    name: S2 - RTP, MP4, snapshot, record, proxy and webhook modules
    needs: s0-toolchain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust 1.94.1
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: 1.94.1

      - name: S2 - Module integration tests
        run: |
          set -euo pipefail
          cargo test -p cheetah-rtp-core
          cargo test -p cheetah-rtp-driver-tokio
          cargo test -p cheetah-rtp-module
          cargo test -p cheetah-mp4-core
          cargo test -p cheetah-mp4-module
          cargo test -p cheetah-snapshot-module
          cargo test -p cheetah-record-module
          cargo test -p cheetah-proxy-module
          cargo test -p cheetah-webhook-dispatcher

  s3-http-adapters:
    name: S3 - Native and ZLM-compatible HTTP adapters
    needs: s0-toolchain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust 1.94.1
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: 1.94.1

      - name: S3 - HTTP adapter and black-box tests
        run: |
          set -euo pipefail
          cargo test -p cheetah-media-module

  s4-signal-contracts:
    name: S4 - Signal contracts, admission and engine integration
    needs: s0-toolchain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust 1.94.1
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: 1.94.1

      - name: S4 - Signal, admission and engine tests
        run: |
          set -euo pipefail
          # Run cheetah-engine tests single-threaded to avoid tokio::process
          # SIGCHLD/waitpid races between concurrent tokio runtimes.
          cargo test -p cheetah-engine -- --test-threads=1
          cargo test -p cheetah-sdk --test signal_contracts

  s5-release-build:
    name: S5 - Release profile build and artifact smoke
    needs: s0-toolchain
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust 1.94.1
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: 1.94.1

      - name: S5 - Release build with full media-control feature set
        run: |
          set -euo pipefail
          cargo build --release -p cheetah-server --features media-control-full

      - name: S5 - Binary smoke test
        run: |
          set -euo pipefail
          ./target/release/cheetah-server --help

      - name: S5 - Upload release artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: cheetah-server-release
          path: target/release/cheetah-server
