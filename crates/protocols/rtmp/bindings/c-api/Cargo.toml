[package]
name = "cheetah-rtmp-c-api"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
name = "cheetah_rtmp"
crate-type = ["cdylib", "staticlib", "rlib"]

[dependencies]
bytes.workspace = true
# Indirectly pulled in via `cheetah-rtmp-core`, but with `default-features = false`. Re-list it
# here to enable the `std` feature; otherwise `cargo build -p cheetah-rtmp-c-api` builds the
# foundation crate without `std` and fails on `std::collections::HashMap` etc. that are used in
# unrelated codec modules.
cheetah-codec = { path = "../../../../foundation/cheetah-codec", features = ["std"] }
cheetah-rtmp-core = { path = "../../core" }

[build-dependencies]
cbindgen = { version = "0.29.2", default-features = false }
