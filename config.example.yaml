global:
  control:
    listen: 127.0.0.1:8891

modules:
  rtmp:
    enabled: true
    listen: 0.0.0.0:1935
    write_queue_capacity: 256
    play_wait_source_timeout_ms: 15000
    subscriber_queue_capacity: 256
    subscriber_backpressure: DropUntilNextKeyframe
    bootstrap_max_frames: 150
    enable_add_mute: false
    emit_play_metadata: true
    # 发布者断连后保活窗口（毫秒），允许重连恢复。0 = 禁用。
    publish_keepalive_ms: 0
    # Paced sender 最小发送间隔（毫秒），平滑突发流量。0 = 禁用。
    paced_sender_ms: 0
    # 直接代理模式：RTMP→RTMP 转发跳过 demux/remux，降低 CPU 开销。
    direct_proxy: false
    # RTMPS (TLS) 配置
    tls:
      enabled: false
      listen: 0.0.0.0:1936
      cert_path: /path/to/cert.pem
      key_path: /path/to/key.pem
      handshake_timeout_ms: 5000
    # 鉴权配置（基于 URL query 参数 token）
    auth:
      enabled: false
      publish_token: ""
      play_token: ""
    # 可观测性告警阈值配置
    # alert_thresholds:
    #   startup_timeout_ms: 3000       # 起播等待告警阈值（毫秒）
    #   timestamp_repair_count: 32     # 时间戳逆序修正计数告警阈值
    #   queue_drop_count: 64           # 队列回压丢帧计数告警阈值
    pull_jobs: []
    push_jobs: []
